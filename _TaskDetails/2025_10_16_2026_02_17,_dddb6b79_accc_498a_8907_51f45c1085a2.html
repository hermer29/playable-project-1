<!doctype html>
<html lang="en" style="height: 100vh;">
<head>
    <meta charset="utf-8">
    <title></title>
    <style>
        body {
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .iframe-container {
            position: relative;
            width: 360px;
            height: 640px;
            outline: 1px solid white;
            overflow: hidden;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid white;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: normal;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .play-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .play-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .iframe-content {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .iframe-content.active {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .overlay.hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="iframe-container">
    <div class="overlay" id="overlay">
        <button class="play-button" onclick="playCreative()">
            Click to Play Creative
        </button>
    </div>
    <div id="iframeContainer" class="iframe-content"></div>
</div>

<script>
    function playCreative() {
        const overlay = document.getElementById('overlay');
        const iframeContainer = document.getElementById('iframeContainer');

        
        const iframe = document.createElement('iframe');
        iframe.scrolling = 'no';
        iframe.src = 'https:\/\/mraid-proxy.dmint.dev\/d\/dd\/ddd\/dddb\/dddb6\/dddb6b\/dddb6b79-accc-498a-8907-51f45c1085a2\/index.html';
        iframe.height = '360';
        iframe.width = '640';
        iframe.allow = 'autoplay';
        iframe.style.border = 'none';
        iframe.style.width = '100%';
        iframe.style.height = '100%';

        
        iframeContainer.appendChild(iframe);

        
        overlay.classList.add('hidden');
        iframeContainer.classList.add('active');
    }
</script>
</body>
</html>
